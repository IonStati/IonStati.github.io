<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow" />
  <meta name="description"
    content="Ion Stati - Building resilient foundations for the digital world. Technical systems and strategic objectives." />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <title>ion@stati:~$</title>

  <style>
    :root {
      --text-color: #e5e7eb;
      --cursor-color: #00ff41;
      --accent-line: rgba(148, 163, 184, 0.25);
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #0f172a;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text-color);
    }

    #fx-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease-out;
    }

    .active-effect #fx-canvas {
      opacity: 1;
    }

    .active-effect {
      overflow: hidden;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 10;
    }

    .wrapper {
      text-align: center;
      animation: fadeIn 1.4s ease-out forwards;
      opacity: 0;
    }

    .hello-container {
      font-size: clamp(1.5rem, 4vi, 3rem);
      letter-spacing: 0.05em;
    }

    #salut-trigger {
      cursor: pointer;
      text-decoration: underline;
      transition: color 0.15s ease;
      outline-offset: 4px;
    }

    #salut-trigger:hover,
    #salut-trigger:focus {
      color: #38bdf8;
    }

    .separator {
      margin: 0 0.6rem;
      opacity: 0.5;
    }

    .contact {
      margin-top: 1.4rem;
      font-size: 1rem;
      opacity: 0.85;
      padding: 0 1rem;
      margin-bottom: 1rem;
      max-width: 640px;
      margin-left: auto;
      margin-right: auto;
    }

    .contact-links {
      margin-top: 0.8rem;
      display: flex;
      gap: 1.2rem;
      justify-content: center;
    }

    .contact-links a {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px solid rgba(229, 231, 235, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-color);
      text-decoration: none;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    .contact-links a:hover,
    .contact-links a:focus {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.05);
      outline: 2px solid #38bdf8;
      outline-offset: 2px;
    }

    .contact-links svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 1em;
      margin-left: 4px;
      background-color: var(--cursor-color);
      animation: blink 1s step-end infinite;
      vertical-align: middle;
    }

    .divider {
      width: 100%;
      max-width: 120px;
      height: 1px;
      background-color: var(--accent-line);
      margin: 3rem auto;
    }

    .bio-text {
      max-width: 580px;
      margin: 0 auto;
      line-height: 1.6;
      padding: 0 1rem;
    }

    .noscript-email {
      margin-top: 1rem;
      font-family: monospace;
      font-size: 0.9rem;
      color: #94a3b8;
    }

    @keyframes blink {
      from, to { opacity: 1; }
      50% { opacity: 0; }
    }

    footer {
      font-size: 0.8rem;
      text-align: center;
      padding: 1rem 0;
      letter-spacing: 0.08em;
      color: rgba(229, 231, 235, 0.6);
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>

<body>
  <canvas id="fx-canvas" aria-hidden="true"></canvas>
  <main>
    <article class="wrapper">
      <div class="hello-container">
        <span>Hello</span>
        <span class="separator">·</span>
        <span>Hola</span>
        <span class="separator">·</span>
        <span id="salut-trigger" role="button" tabindex="0">Salut</span>
        <span class="separator">·</span>
        <span>Привет</span>
      </div>
      <section class="contact">
        <div class="divider"></div>
        <h2>Building resilient foundations for the digital world.</h2>
        <p class="bio-text">
          I specialize in bridging the gap between complex technical systems and strategic objectives. My focus is on
          ensuring trust, stability, and scale in environments where failure is not an option.
        </p>
        <div class="divider"></div>
        <nav class="contact-links">
          <a href="https://www.linkedin.com/in/stati/" target="_blank" rel="noopener noreferrer"
            aria-label="LinkedIn Profile">
            <svg role="img" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
              <title>LinkedIn</title>
              <rect x="6" y="13" width="3" height="13" rx="1"></rect>
              <circle cx="7.5" cy="9.5" r="1.5"></circle>
              <path
                d="M13 13h3v2.1c.5-1 1.8-2.3 4.1-2.3 3.9 0 4.9 2.6 4.9 6v7.2h-3.5v-6.4c0-1.8-.3-3.5-2.6-3.5-2.3 0-2.7 1.8-2.7 3.7v6.2H13V13z" />
            </svg>
          </a>
          <a id="mail-btn" aria-label="Email Address" role="button" href="#">
            <svg role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <title>Email</title>
              <path d="M2 4h20v16H2V4zm10 7L4 6v2l8 5 8-5V6l-8 5z" />
            </svg>
          </a>
        </nav>

        <noscript>
          <div class="noscript-email">GetlnTouch [at] stati [dot] org</div>
        </noscript>
      </section>
    </article>
  </main>

  <footer id="dynamic-footer">
    <noscript>© 2026 All rights reserved</noscript>
  </footer>

  <script>
    const canvas = document.getElementById('fx-canvas');
    const ctx = canvas.getContext('2d');
    const triggerElement = document.getElementById('salut-trigger');
    let animationFrameId = null;
    let effectActive = false;

    const characters = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ!@#$%^&*{}/\\()[]+=-|';
    const charArray = characters.split('');
    
    let fontSize, columns, drops, dpr;

    const initMatrix = () => {
      dpr = window.devicePixelRatio || 1;
      const displayWidth = window.innerWidth;
      const displayHeight = window.innerHeight;
      canvas.width = displayWidth * dpr;
      canvas.height = displayHeight * dpr;
      canvas.style.width = displayWidth + 'px';
      canvas.style.height = displayHeight + 'px';
      fontSize = Math.max(10, Math.min(16, window.innerWidth / 40)) * dpr;
      columns = Math.floor(canvas.width / fontSize);
      drops = Array(columns).fill(1);
    };

    window.addEventListener('resize', () => {
      initMatrix();
    });

    initMatrix();

    const draw = () => {
      ctx.fillStyle = 'rgba(15, 23, 42, 0.1)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.fillStyle = '#38bdf8';
      ctx.font = `${fontSize}px monospace`;

      for (let i = 0; i < drops.length; i++) {
        const text = charArray[Math.floor(Math.random() * charArray.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }

      if (effectActive) {
        animationFrameId = requestAnimationFrame(draw);
      }
    };

    const toggleEffect = () => {
      effectActive = !effectActive;
      if (effectActive) {
        initMatrix();
        document.body.classList.add('active-effect');
        draw();
      } else {
        document.body.classList.remove('active-effect');
        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId);
          animationFrameId = null;
        }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    };

    triggerElement.addEventListener('click', toggleEffect);
    triggerElement.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        toggleEffect();
      }
    });

    const footer = document.getElementById('dynamic-footer');
    if (footer) {
      footer.innerHTML = `© ${new Date().getFullYear()} All rights reserved<span class="cursor" title="#define CONCEPT 生き甲斐"></span>`;
    }

    const mailBtn = document.getElementById('mail-btn');
    if (mailBtn) {
      const setMail = () => {
        const user = "GetlnTouch";
        const domain = "stati.org";
        mailBtn.setAttribute('href', `mailto:${user}@${domain}`);
      };
      mailBtn.addEventListener('mouseenter', setMail);
      mailBtn.addEventListener('focus', setMail);
    }
  </script>
